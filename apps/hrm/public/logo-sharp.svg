<svg xmlns="http://www.w3.org/2000/svg" width="114" height="43" viewBox="0 0 114 43">
  <title>Sharpened logo (embedded from favicon.png)</title>
  <desc>Automatically sharpened raster logo embedded in SVG using an unsharp mask filter.</desc>
  <defs>
    <filter id="unsharp" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="arithmetic" k1="0" k2="1.4" k3="-0.4" k4="0" result="sharpened" />
    </filter>
  </defs>
  <image href="data:image/png;base64," x="0" y="0" width="114" height="43" filter="url(#unsharp)"/>
</svg>
